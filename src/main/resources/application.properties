spring.application.name=omnia-backend

############################
# Server
############################
server.port=8080

############################
# Database
############################
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/omnia_db?useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=SERVER}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

############################
# JPA / Hibernate
############################
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

############################
# Flyway
############################
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

############################
# JWT
############################
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

############################
# Email / SMTP
############################
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:temporary@example.com}
spring.mail.password=${MAIL_PASSWORD:temporary-password}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.test-connection=false

############################
# Verification URL
############################
app.frontend.base-url=http://localhost:8080/api/auth