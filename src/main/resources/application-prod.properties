############################
# Production Database
############################
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

############################
# Production JPA
############################
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

############################
# Production JWT
############################
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

############################
# Production Email
############################
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

############################
# Production URLs
############################
app.backend.base-url=${APP_BACKEND_BASE_URL}
app.frontend.base-url=${APP_FRONTEND_BASE_URL}
app.frontend.reset-password-url=${APP_RESET_PASSWORD_URL}

############################
# Production File Upload
############################
app.file.upload-dir=${FILE_UPLOAD_DIR}
app.file.max-size=${FILE_UPLOAD_MAX_SIZE:5MB}

spring.servlet.multipart.max-file-size=${FILE_UPLOAD_MAX_SIZE:5MB}
spring.servlet.multipart.max-request-size=${FILE_UPLOAD_MAX_REQUEST_SIZE:6MB}

############################
# Production Security Tokens
############################
app.security.refresh-token.lifetime=${REFRESH_TOKEN_LIFETIME:30d}
app.security.email-verification.lifetime=${EMAIL_VERIFICATION_TOKEN_LIFETIME:24h}
app.security.password-reset.lifetime=${PASSWORD_RESET_TOKEN_LIFETIME:30m}

############################
# Production Error Responses
############################
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.whitelabel.enabled=false

############################
# Production Logging
############################
logging.level.root=INFO
logging.level.com.omnia.backend=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

############################
# Production API Documentation
############################
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false