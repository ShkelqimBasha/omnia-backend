spring.application.name=omnia-backend

############################
# Server
############################
server.port=${SERVER_PORT:8080}

############################
# JPA / Hibernate
############################
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

############################
# Flyway
############################
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

############################
# JWT
############################
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

############################
# Email / SMTP
############################
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.test-connection=false

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

############################
# File Upload
############################
app.file.max-size=${FILE_UPLOAD_MAX_SIZE:5MB}

spring.servlet.multipart.max-file-size=${FILE_UPLOAD_MAX_SIZE:5MB}
spring.servlet.multipart.max-request-size=${FILE_UPLOAD_MAX_REQUEST_SIZE:6MB}

############################
# Security Token Lifetimes
############################
app.security.refresh-token.lifetime=${REFRESH_TOKEN_LIFETIME:30d}
app.security.email-verification.lifetime=${EMAIL_VERIFICATION_TOKEN_LIFETIME:24h}
app.security.password-reset.lifetime=${PASSWORD_RESET_TOKEN_LIFETIME:30m}

############################
# Logging
############################
logging.pattern.level=%5p [correlationId=%X{correlationId:-}]

############################
# Actuator
############################
management.endpoints.web.exposure.include=health,info

management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.endpoint.health.probes.add-additional-paths=true

management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.mail.enabled=false

management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db,diskSpace