spring.application.name=omnia-backend-test

############################
# JPA / Hibernate
############################
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

############################
# Flyway
############################
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

############################
# JWT
############################
app.jwt.secret=IntegrationTestJwtSecretKeyThatIsLongEnoughForHS256AndContainsMoreThan64Characters123456789
app.jwt.expiration=86400000

############################
# Email / SMTP
############################
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@omnia.local
spring.mail.password=test-password
spring.mail.test-connection=false

spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

############################
# Application URLs
############################
app.backend.base-url=http://localhost
app.frontend.base-url=http://localhost/api/auth
app.frontend.reset-password-url=http://localhost/reset-password

############################
# File Upload
############################
app.file.upload-dir=${java.io.tmpdir}/omnia-integration-uploads

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

############################
# Optional test cleanup
############################
spring.task.scheduling.enabled=false    