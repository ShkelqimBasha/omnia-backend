############################
# Development Database
############################
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/omnia_db?useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=SERVER}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

############################
# Development JPA Logging
############################
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

############################
# Development JWT
############################
# Development-only fallback. Production has no fallback.
app.jwt.secret=${JWT_SECRET:DevelopmentOnlyJwtSecretKeyThatMustNeverBeUsedInProduction123456789}

############################
# Development Email
############################
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

############################
# Development URLs
############################
app.backend.base-url=${APP_BACKEND_BASE_URL:http://localhost:8080}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:8080/api/auth}
app.frontend.reset-password-url=${APP_RESET_PASSWORD_URL:http://localhost:8080/reset-password}

############################
# Development File Upload
############################
app.file.upload-dir=${FILE_UPLOAD_DIR:uploads}

############################
# Development API Documentation
############################
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true